<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perceptron Logic Agent - Wumpus World</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Knowledge-Based Logic Agent</h1>
            <p>Single-Layer Perceptron Training & Resolution Refutation</p>
        </header>

        <div class="main-layout">
            <!-- Control Panel -->
            <aside class="controls">
                <div class="card">
                    <h3>Environment Config</h3>
                    <div class="input-group">
                        <label>Rows:</label>
                        <input type="number" id="rows" value="4" min="2" max="10">
                    </div>
                    <div class="input-group">
                        <label>Cols:</label>
                        <input type="number" id="cols" value="4" min="2" max="10">
                    </div>
                    <div class="input-group">
                        <label>Pits:</label>
                        <input type="number" id="pits" value="2">
                    </div>
                    <button id="runBtn" class="primary-btn">Start New Episode</button>
                </div>

                <div class="card metrics">
                    <h3>Live Metrics</h3>
                    <p>Total Inference Steps: <span id="infSteps">0</span></p>
                    <p>Status: <span id="agentStatus">Idle</span></p>
                    <p>Gold: <span id="goldStatus">No</span></p>
                </div>
            </aside>

            <!-- Grid Display -->
            <main class="grid-area">
                <div id="wumpusGrid" class="grid"></div>
            </main>

            <!-- Event Log -->
            <section class="log-area">
                <div class="card">
                    <h3>Agent Log</h3>
                    <div id="logContent" class="log-box"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
